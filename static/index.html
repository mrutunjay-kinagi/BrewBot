<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrewBot ☕</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    [data-theme="dark"] {
      --surface:     rgba(10, 8, 20, 0.72);
      --surface-2:   rgba(255,255,255,0.08);
      --border:      rgba(255,255,255,0.10);
      --accent:      #7ee8c2;
      --accent-2:    #5bc4a0;
      --user-bg:     rgba(94, 200, 160, 0.35);
      --bot-bg:      rgba(10, 8, 20, 0.65);
      --text:        #e8f8f2;
      --text-sub:    #7ab8a0;
      --text-strong: #a8ecd4;
      --input-bg:    rgba(5, 4, 14, 0.70);
      --glow:        rgba(126, 232, 194, 0.18);
    }

    [data-theme="light"] {
      --surface:     rgba(255, 248, 235, 0.82);
      --surface-2:   rgba(255,255,255,0.55);
      --border:      rgba(180, 120, 60, 0.22);
      --accent:      #b05a10;
      --accent-2:    #d4802a;
      --user-bg:     rgba(176, 90, 16, 0.85);
      --bot-bg:      rgba(255, 245, 225, 0.80);
      --text:        #1e0e04;
      --text-sub:    #7a4820;
      --text-strong: #6a2e08;
      --input-bg:    rgba(255, 248, 235, 0.90);
      --glow:        rgba(176, 90, 16, 0.12);
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: color 0.6s;
      position: relative;
      overflow: hidden;
    }

    /* ── Northern lights / sunrise background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      transition: opacity 0.8s;
    }

    [data-theme="dark"] body::before {
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(0,180,120,0.28) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 5%,  rgba(80,40,180,0.30) 0%, transparent 55%),
        radial-gradient(ellipse 70% 45% at 50% 0%,  rgba(0,220,180,0.18) 0%, transparent 50%),
        radial-gradient(ellipse 50% 35% at 10% 40%, rgba(60,0,140,0.22) 0%, transparent 55%),
        radial-gradient(ellipse 60% 40% at 90% 35%, rgba(0,160,100,0.18) 0%, transparent 50%),
        linear-gradient(170deg, #050210 0%, #080418 40%, #030d10 70%, #040812 100%);
      animation: aurora 12s ease-in-out infinite alternate;
    }

    [data-theme="light"] body::before {
      background:
        radial-gradient(ellipse 90% 60% at 50% -10%, rgba(255,200,80,0.55) 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 10% 20%,  rgba(255,140,60,0.30) 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 90% 15%,  rgba(255,180,80,0.28) 0%, transparent 55%),
        radial-gradient(ellipse 80% 60% at 50% 100%, rgba(200,120,40,0.20) 0%, transparent 60%),
        linear-gradient(170deg, #fff3d0 0%, #ffe8b0 30%, #ffd890 60%, #ffecd5 100%);
      animation: sunrise 12s ease-in-out infinite alternate;
    }

    @keyframes aurora {
      0%   { filter: hue-rotate(0deg)   brightness(1);    }
      33%  { filter: hue-rotate(15deg)  brightness(1.08); }
      66%  { filter: hue-rotate(-10deg) brightness(0.95); }
      100% { filter: hue-rotate(20deg)  brightness(1.05); }
    }

    @keyframes sunrise {
      0%   { filter: hue-rotate(0deg)  brightness(1);    }
      50%  { filter: hue-rotate(8deg)  brightness(1.06); }
      100% { filter: hue-rotate(-5deg) brightness(0.97); }
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 740px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
      transition: background 0.3s, border-color 0.3s;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      box-shadow: 0 2px 8px var(--glow);
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .brand-sub {
      font-size: 0.7rem;
      color: var(--text-sub);
      text-decoration: none;
      display: block;
    }
    .brand-sub:hover { color: var(--accent); }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .theme-btn {
      width: 34px;
      height: 34px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      color: var(--text);
    }
    .theme-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    #reset-btn {
      height: 34px;
      padding: 0 12px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-sub);
      font-size: 0.78rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    #reset-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Chat ── */
    #chat {
      flex: 1;
      width: 100%;
      max-width: 740px;
      overflow-y: auto;
      padding: 28px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    /* ── Message rows ── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeUp 0.25s ease;
    }
    .msg-row.user { flex-direction: row-reverse; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .av {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      flex-shrink: 0;
      margin-bottom: 1px;
    }
    .av.bot  { background: linear-gradient(135deg, var(--accent), var(--accent-2)); }
    .av.user { background: var(--surface-2); color: var(--text-sub); }

    .bubble {
      max-width: 72%;
      padding: 11px 15px;
      border-radius: 20px;
      font-size: 0.93rem;
      line-height: 1.6;
      color: var(--text);
      transition: background 0.3s;
    }

    .bubble.bot {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
    }

    .bubble.user {
      background: var(--user-bg);
      border-bottom-right-radius: 5px;
      color: #fff;
    }

    .bubble.typing {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
      padding: 14px 16px;
    }

    .dots {
      display: flex;
      gap: 4px;
      align-items: center;
      height: 16px;
    }
    .dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.3s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 60%, 100% { transform: scale(1); opacity: 0.5; }
      30% { transform: scale(1.4); opacity: 1; }
    }

    .bubble.bot p { margin-bottom: 6px; }
    .bubble.bot p:last-child { margin-bottom: 0; }
    .bubble.bot ul, .bubble.bot ol { padding-left: 20px; margin-bottom: 6px; }
    .bubble.bot li { margin-bottom: 3px; }
    .bubble.bot strong { color: var(--text-strong); font-weight: 600; }
    .bubble.bot h3 { font-size: 0.95rem; color: var(--text-strong); margin-bottom: 6px; }
    .bubble.bot code { background: var(--bg); padding: 1px 6px; border-radius: 5px; font-size: 0.84em; }
    .bubble.bot pre { background: var(--bg); padding: 10px 12px; border-radius: 10px; overflow-x: auto; margin-bottom: 6px; }
    .bubble.bot pre code { background: none; padding: 0; }
    .bubble.bot hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }

    /* ── Quick prompts ── */
    #quick-prompts {
      width: 100%;
      max-width: 740px;
      padding: 0 20px 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .qp {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.78rem;
      color: var(--text-sub);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .qp:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--glow);
    }

    /* ── Input ── */
    #input-area {
      width: 100%;
      max-width: 740px;
      padding: 10px 20px 18px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      border-top: 1px solid var(--border);
      background: var(--surface);
      transition: background 0.3s, border-color 0.3s;
    }

    #msg {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 14px;
      padding: 11px 16px;
      font-size: 0.93rem;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #msg::placeholder { color: var(--text-sub); }
    #msg:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    #send-btn {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: none;
      border-radius: 14px;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 8px var(--glow);
      transition: opacity 0.2s, transform 0.15s;
    }
    #send-btn:hover:not(:disabled) { transform: scale(1.05); }
    #send-btn:active:not(:disabled) { transform: scale(0.97); }
    #send-btn:disabled { opacity: 0.3; cursor: default; box-shadow: none; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      header { padding: 10px 14px; }
      #chat { padding: 20px 14px 12px; }
      #input-area { padding: 8px 14px 14px; }
      #quick-prompts { padding: 0 14px 10px; }
      .bubble { max-width: 85%; font-size: 0.9rem; }
      .brand-name { font-size: 0.95rem; }
      #reset-btn span { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <div class="brand-icon">☕</div>
      <div>
        <div class="brand-name">BrewBot</div>
        <a class="brand-sub" href="https://www.instagram.com/mrutunjay.kinagi/" target="_blank">by @mrutunjay.kinagi</a>
      </div>
    </div>
    <div class="header-actions">
      <button class="theme-btn" id="theme-btn" title="Toggle theme">🌙</button>
      <button id="reset-btn"><span>New </span>chat</button>
    </div>
  </header>

  <div id="chat"></div>

  <div id="quick-prompts">
    <button class="qp">V60 recipe ☕</button>
    <button class="qp">Best espresso ratio</button>
    <button class="qp">Iced coffee tips 🧊</button>
    <button class="qp">Fix bitter coffee</button>
  </div>

  <div id="input-area">
    <textarea id="msg" rows="1" placeholder="Ask me anything about coffee..."></textarea>
    <button id="send-btn" aria-label="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

  <script>
    const chatEl   = document.getElementById('chat');
    const msg      = document.getElementById('msg');
    const sendBtn  = document.getElementById('send-btn');
    const resetBtn = document.getElementById('reset-btn');
    const themeBtn = document.getElementById('theme-btn');
    const html     = document.documentElement;

    let theme = localStorage.getItem('theme') || 'dark';
    applyTheme(theme);

    function applyTheme(t) {
      theme = t;
      html.setAttribute('data-theme', t);
      themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
      localStorage.setItem('theme', t);
    }

    themeBtn.addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));

    document.querySelectorAll('.qp').forEach(btn => {
      btn.addEventListener('click', () => {
        msg.value = btn.textContent.replace(/[☕🧊]/g, '').trim();
        sendMessage();
      });
    });

    function addBubble(text, role) {
      const row = document.createElement('div');
      row.className = `msg-row ${role}`;

      const av = document.createElement('div');
      av.className = `av ${role}`;
      av.textContent = role === 'bot' ? '☕' : '👤';

      const bubble = document.createElement('div');
      bubble.className = `bubble ${role}`;
      if (role === 'bot') {
        bubble.innerHTML = marked.parse(text);
      } else {
        bubble.textContent = text;
      }

      row.appendChild(av);
      row.appendChild(bubble);
      chatEl.appendChild(row);
      chatEl.scrollTop = chatEl.scrollHeight;
      return row;
    }

    function addTyping() {
      const row = document.createElement('div');
      row.className = 'msg-row bot';

      const av = document.createElement('div');
      av.className = 'av bot';
      av.textContent = '☕';

      const bubble = document.createElement('div');
      bubble.className = 'bubble typing';
      bubble.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';

      row.appendChild(av);
      row.appendChild(bubble);
      chatEl.appendChild(row);
      chatEl.scrollTop = chatEl.scrollHeight;
      return row;
    }

    async function sendMessage() {
      const text = msg.value.trim();
      if (!text || sendBtn.disabled) return;

      const qp = document.getElementById('quick-prompts');
      if (qp) qp.style.display = 'none';

      addBubble(text, 'user');
      msg.value = '';
      msg.style.height = 'auto';
      sendBtn.disabled = true;

      const typing = addTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });
        typing.remove();
        if (res.status === 429) {
          addBubble("You've sent a lot of messages! Take a breather and try again in an hour. ☕", 'bot');
        } else {
          const data = await res.json();
          addBubble(data.reply, 'bot');
        }
      } catch {
        typing.remove();
        addBubble('Something went wrong. Please try again.', 'bot');
      } finally {
        sendBtn.disabled = false;
        msg.focus();
      }
    }

    async function resetChat() {
      chatEl.innerHTML = '';
      const qp = document.getElementById('quick-prompts');
      if (qp) qp.style.display = 'flex';
      const typing = addTyping();
      try {
        const res = await fetch('/api/reset', { method: 'POST' });
        const data = await res.json();
        typing.remove();
        addBubble(data.reply, 'bot');
      } catch {
        typing.remove();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    resetBtn.addEventListener('click', resetChat);

    msg.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    msg.addEventListener('input', () => {
      msg.style.height = 'auto';
      msg.style.height = Math.min(msg.scrollHeight, 120) + 'px';
    });

    resetChat();
  </script>
</body>
</html>
