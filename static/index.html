<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrewBot ☕</title>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#f5922a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BrewBot">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    [data-theme="dark"] {
      --surface:     rgba(18, 5, 8, 0.75);
      --surface-2:   rgba(255,255,255,0.07);
      --border:      rgba(244, 120, 80, 0.16);
      --accent:      #f4845a;
      --accent-2:    #d4603a;
      --user-bg:     rgba(210, 85, 45, 0.40);
      --bot-bg:      rgba(18, 5, 8, 0.68);
      --text:        #f5922a;
      --text-sub:    #c46820;
      --text-strong: #ffb347;
      --input-bg:    rgba(12, 3, 5, 0.72);
      --glow:        rgba(244, 132, 90, 0.22);
    }

    [data-theme="light"] {
      --surface:     rgba(255, 248, 235, 0.82);
      --surface-2:   rgba(255,255,255,0.55);
      --border:      rgba(180, 120, 60, 0.22);
      --accent:      #b05a10;
      --accent-2:    #d4802a;
      --user-bg:     rgba(176, 90, 16, 0.85);
      --bot-bg:      rgba(255, 245, 225, 0.80);
      --text:        #5c2d0a;
      --text-sub:    #9b6030;
      --text-strong: #7b3a0a;
      --input-bg:    rgba(255, 248, 235, 0.90);
      --glow:        rgba(176, 90, 16, 0.12);
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: color 0.6s;
      position: relative;
      overflow: hidden;
    }

    /* ── Northern lights / sunrise background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      transition: opacity 0.8s;
    }

    [data-theme="dark"] body::before {
      background:
        radial-gradient(ellipse 90% 55% at 50% 0%,   rgba(255, 100, 40, 0.38) 0%, transparent 55%),
        radial-gradient(ellipse 60% 45% at 15% 15%,  rgba(220, 60, 80, 0.28) 0%, transparent 50%),
        radial-gradient(ellipse 55% 40% at 85% 10%,  rgba(255, 140, 20, 0.25) 0%, transparent 50%),
        radial-gradient(ellipse 70% 50% at 50% 45%,  rgba(140, 30, 60, 0.22) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 20% 70%,  rgba(80, 10, 40, 0.30) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 80% 75%,  rgba(60, 10, 30, 0.25) 0%, transparent 55%),
        linear-gradient(175deg, #1a050a 0%, #2e0a10 25%, #180510 55%, #0e0308 100%);
      animation: sunset 14s ease-in-out infinite alternate;
    }

    [data-theme="light"] body::before {
      background:
        radial-gradient(ellipse 90% 60% at 50% -10%, rgba(255,200,80,0.55) 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 10% 20%,  rgba(255,140,60,0.30) 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 90% 15%,  rgba(255,180,80,0.28) 0%, transparent 55%),
        radial-gradient(ellipse 80% 60% at 50% 100%, rgba(200,120,40,0.20) 0%, transparent 60%),
        linear-gradient(170deg, #fff3d0 0%, #ffe8b0 30%, #ffd890 60%, #ffecd5 100%);
      animation: sunrise 12s ease-in-out infinite alternate;
    }

    @keyframes sunset {
      0%   { filter: hue-rotate(0deg)   brightness(1);    }
      33%  { filter: hue-rotate(12deg)  brightness(1.10); }
      66%  { filter: hue-rotate(-8deg)  brightness(0.93); }
      100% { filter: hue-rotate(18deg)  brightness(1.06); }
    }

    @keyframes sunrise {
      0%   { filter: hue-rotate(0deg)  brightness(1);    }
      50%  { filter: hue-rotate(8deg)  brightness(1.06); }
      100% { filter: hue-rotate(-5deg) brightness(0.97); }
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 740px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
      transition: background 0.3s, border-color 0.3s;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      box-shadow: 0 2px 8px var(--glow);
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .brand-sub {
      font-size: 0.7rem;
      color: var(--text-sub);
      text-decoration: none;
      display: block;
    }
    .brand-sub:hover { color: var(--accent); }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .theme-btn {
      width: 34px;
      height: 34px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      color: var(--text);
    }
    .theme-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    #reset-btn {
      height: 34px;
      padding: 0 12px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-sub);
      font-size: 0.78rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    #reset-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    #install-btn {
      height: 34px;
      padding: 0 12px;
      background: none;
      border: 1px solid var(--accent);
      border-radius: 10px;
      color: var(--accent);
      font-size: 0.78rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      display: none;
      align-items: center;
      gap: 5px;
    }
    #install-btn:hover {
      background: var(--glow);
    }

    /* ── Chat ── */
    #chat {
      flex: 1;
      width: 100%;
      max-width: 740px;
      overflow-y: auto;
      padding: 28px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    /* ── Message rows ── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeUp 0.25s ease;
    }
    .msg-row.user { flex-direction: row-reverse; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .av {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      flex-shrink: 0;
      margin-bottom: 1px;
    }
    .av.bot  { background: linear-gradient(135deg, var(--accent), var(--accent-2)); }
    .av.user { background: var(--surface-2); color: var(--text-sub); }

    .bubble {
      max-width: 72%;
      padding: 11px 15px;
      border-radius: 20px;
      font-size: 0.93rem;
      line-height: 1.6;
      color: var(--text);
      transition: background 0.3s;
    }

    .bubble.bot {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
      position: relative;
    }

    .dl-btn {
      position: absolute;
      top: 7px;
      right: 8px;
      width: 24px;
      height: 24px;
      border-radius: 7px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-sub);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s, color 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .bubble.bot:hover .dl-btn { opacity: 1; }
    .dl-btn:hover { color: var(--accent); border-color: var(--accent); }

    .bubble.user {
      background: var(--user-bg);
      border-bottom-right-radius: 5px;
      color: #fff;
      position: relative;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .user-msg-content {
      flex: 1;
    }

    .edit-btn {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s, background 0.2s;
      flex-shrink: 0;
      font-size: 0.7rem;
      padding: 0;
    }
    .msg-row.user:hover .edit-btn { opacity: 1; }
    .edit-btn:hover { background: rgba(255,255,255,0.2); }

    .edit-mode {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .edit-mode.active { display: flex; }

    .edit-dialog {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .edit-dialog h3 {
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 12px;
    }

    .edit-dialog textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 12px;
      padding: 12px;
      font-size: 0.93rem;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      min-height: 80px;
      margin-bottom: 12px;
    }

    .edit-dialog textarea:focus {
      border-color: var(--accent);
    }

    .edit-dialog .buttons {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .edit-dialog button {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
      font-family: inherit;
    }

    .edit-dialog button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .edit-dialog button.save {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .edit-dialog button.save:hover {
      background: var(--accent-2);
      border-color: var(--accent-2);
    }

    .bubble.typing {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
      padding: 14px 16px;
    }

    .dots {
      display: flex;
      gap: 4px;
      align-items: center;
      height: 16px;
    }
    .dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.3s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 60%, 100% { transform: scale(1); opacity: 0.5; }
      30% { transform: scale(1.4); opacity: 1; }
    }

    .bubble.bot p { margin-bottom: 6px; }
    .bubble.bot p:last-child { margin-bottom: 0; }
    .bubble.bot ul, .bubble.bot ol { padding-left: 20px; margin-bottom: 6px; }
    .bubble.bot li { margin-bottom: 3px; }
    .bubble.bot strong { color: var(--text-strong); font-weight: 600; }
    .bubble.bot h3 { font-size: 0.95rem; color: var(--text-strong); margin-bottom: 6px; }
    .bubble.bot code { background: var(--bg); padding: 1px 6px; border-radius: 5px; font-size: 0.84em; }
    .bubble.bot pre { background: var(--bg); padding: 10px 12px; border-radius: 10px; overflow-x: auto; margin-bottom: 6px; }
    .bubble.bot pre code { background: none; padding: 0; }
    .bubble.bot hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }

    /* ── Quick prompts ── */
    #quick-prompts {
      width: 100%;
      max-width: 740px;
      padding: 0 20px 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .qp {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.78rem;
      color: var(--text-sub);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .qp:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--glow);
    }

    /* ── Input ── */
    #input-area {
      width: 100%;
      max-width: 740px;
      padding: 10px 20px 18px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      border-top: 1px solid var(--border);
      background: var(--surface);
      transition: background 0.3s, border-color 0.3s;
    }

    #msg {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 14px;
      padding: 11px 16px;
      font-size: 0.93rem;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #msg::placeholder { color: var(--text-sub); }
    #msg:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    #send-btn {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: none;
      border-radius: 14px;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 8px var(--glow);
      transition: opacity 0.2s, transform 0.15s;
    }
    #send-btn:hover:not(:disabled) { transform: scale(1.05); }
    #send-btn:active:not(:disabled) { transform: scale(0.97); }
    #send-btn:disabled { opacity: 0.3; cursor: default; box-shadow: none; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      header { padding: 10px 14px; }
      #chat { padding: 20px 14px 12px; }
      #input-area { padding: 8px 14px 14px; }
      #quick-prompts { padding: 0 14px 10px; }
      .bubble { max-width: 85%; font-size: 0.9rem; }
      .brand-name { font-size: 0.95rem; }
      #reset-btn span { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <div class="brand-icon">☕</div>
      <div>
        <div class="brand-name">BrewBot</div>
        <a class="brand-sub" href="https://www.instagram.com/jay.is.caffeinating/" target="_blank">by @jay.is.caffeinating</a>
      </div>
    </div>
    <div class="header-actions">
      <button id="install-btn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Install app
      </button>
      <button class="theme-btn" id="theme-btn" title="Toggle theme">🌙</button>
      <button id="reset-btn"><span>New </span>chat</button>
    </div>
  </header>

  <div id="chat"></div>

  <div id="quick-prompts">
    <button class="qp">V60 recipe</button>
    <button class="qp">South Indian Filter</button>
    <button class="qp">Iced pour-over</button>
    <button class="qp">Anaerobic espresso</button>
    <button class="qp">Fix bitter coffee</button>
    <button class="qp">Flair Pro recipe</button>
  </div>

  <div id="input-area">
    <textarea id="msg" rows="1" placeholder="Ask me anything about coffee..."></textarea>
    <button id="send-btn" aria-label="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

  <div id="edit-mode" class="edit-mode">
    <div class="edit-dialog">
      <h3>Edit your message</h3>
      <textarea id="edit-textarea" placeholder="Edit your message..."></textarea>
      <div class="buttons">
        <button id="edit-cancel">Cancel</button>
        <button id="edit-save" class="save">Save</button>
      </div>
    </div>
  </div>

  <script>
    const chatEl   = document.getElementById('chat');
    const msg      = document.getElementById('msg');
    const sendBtn  = document.getElementById('send-btn');
    const resetBtn = document.getElementById('reset-btn');
    const themeBtn = document.getElementById('theme-btn');
    const html     = document.documentElement;

    let theme = localStorage.getItem('theme') || 'dark';
    applyTheme(theme);

    function applyTheme(t) {
      theme = t;
      html.setAttribute('data-theme', t);
      themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
      localStorage.setItem('theme', t);
    }

    themeBtn.addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));

    document.querySelectorAll('.qp').forEach(btn => {
      btn.addEventListener('click', () => {
        msg.value = btn.textContent.replace(/[☕🧊]/g, '').trim();
        sendMessage();
      });
    });

    function addBubble(text, role, messageIndex = null) {
      const row = document.createElement('div');
      row.className = `msg-row ${role}`;

      const av = document.createElement('div');
      av.className = `av ${role}`;
      av.textContent = role === 'bot' ? '☕' : '👤';

      const bubble = document.createElement('div');
      bubble.className = `bubble ${role}`;
      
      if (role === 'bot') {
        bubble.innerHTML = marked.parse(text);
        const dlBtn = document.createElement('button');
        dlBtn.className = 'dl-btn';
        dlBtn.title = 'Copy to clipboard';
        dlBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
        dlBtn.addEventListener('click', () => {
          const plain = text.replace(/\*\*(.*?)\*\*/g, '$1').replace(/\*(.*?)\*/g, '$1').replace(/#{1,6}\s/g, '').trim();
          navigator.clipboard.writeText(plain).then(() => {
            dlBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
            setTimeout(() => {
              dlBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
            }, 2000);
          });
        });
        bubble.appendChild(dlBtn);
      } else {
        const content = document.createElement('div');
        content.className = 'user-msg-content';
        content.textContent = text;
        bubble.appendChild(content);
        
        const editBtn = document.createElement('button');
        editBtn.className = 'edit-btn';
        editBtn.title = 'Edit message';
        editBtn.innerHTML = '✏️';
        editBtn.addEventListener('click', () => openEditDialog(text, messageIndex));
        bubble.appendChild(editBtn);
      }

      row.appendChild(av);
      row.appendChild(bubble);
      chatEl.appendChild(row);
      chatEl.scrollTop = chatEl.scrollHeight;
      return row;
    }

    function addTyping() {
      const row = document.createElement('div');
      row.className = 'msg-row bot';

      const av = document.createElement('div');
      av.className = 'av bot';
      av.textContent = '☕';

      const bubble = document.createElement('div');
      bubble.className = 'bubble typing';
      bubble.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';

      row.appendChild(av);
      row.appendChild(bubble);
      chatEl.appendChild(row);
      chatEl.scrollTop = chatEl.scrollHeight;
      return row;
    }

    async function sendMessage() {
      const text = msg.value.trim();
      if (!text || sendBtn.disabled) return;

      const qp = document.getElementById('quick-prompts');
      if (qp) qp.style.display = 'none';

      const userMessageIndex = document.querySelectorAll('.msg-row.user').length;
      addBubble(text, 'user', userMessageIndex);
      msg.value = '';
      msg.style.height = 'auto';
      sendBtn.disabled = true;

      const typing = addTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });
        typing.remove();
        if (res.ok) {
          const data = await res.json();
          addBubble(data.reply, 'bot');
        } else {
          const data = await res.json().catch(() => ({}));
          const msg = data.detail || (res.status === 429
            ? "You've sent a lot of messages! Take a breather and try again in an hour. ☕"
            : "Something went wrong. Please try again.");
          addBubble(msg, 'bot');
        }
      } catch {
        typing.remove();
        addBubble('Something went wrong. Please try again.', 'bot');
      } finally {
        sendBtn.disabled = false;
        msg.focus();
      }
    }

    async function resetChat() {
      chatEl.innerHTML = '';
      const qp = document.getElementById('quick-prompts');
      if (qp) qp.style.display = 'flex';
      const typing = addTyping();
      try {
        const res = await fetch('/api/reset', { method: 'POST' });
        const data = await res.json();
        typing.remove();
        addBubble(data.reply, 'bot');
      } catch {
        typing.remove();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    resetBtn.addEventListener('click', resetChat);

    function openEditDialog(originalText, messageIndex) {
      const dialog = document.getElementById('edit-mode');
      const textarea = document.getElementById('edit-textarea');
      textarea.value = originalText;
      textarea.focus();
      textarea.select();
      dialog.classList.add('active');
      
      document.getElementById('edit-save').onclick = () => handleEditSubmit(messageIndex);
      document.getElementById('edit-cancel').onclick = () => closeEditDialog();
    }

    function closeEditDialog() {
      document.getElementById('edit-mode').classList.remove('active');
    }

    async function handleEditSubmit(messageIndex) {
      const newText = document.getElementById('edit-textarea').value.trim();
      if (!newText) return;

      closeEditDialog();
      sendBtn.disabled = true;

      // Remove the edited message and all messages after it
      const userRows = document.querySelectorAll('.msg-row.user');
      const editedRow = userRows[messageIndex];
      let nextRow = editedRow.nextElementSibling;
      editedRow.remove();
      while (nextRow) {
        const temp = nextRow.nextElementSibling;
        nextRow.remove();
        nextRow = temp;
      }

      // Show typing indicator
      const typing = addTyping();

      try {
        const res = await fetch('/api/edit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message_index: messageIndex, new_text: newText }),
        });
        typing.remove();
        
        if (res.ok) {
          addBubble(newText, 'user', messageIndex);
          const data = await res.json();
          addBubble(data.reply, 'bot');
        } else {
          const data = await res.json().catch(() => ({}));
          const errMsg = data.detail || 'Something went wrong.';
          addBubble(errMsg, 'bot');
        }
      } catch {
        typing.remove();
        addBubble('Something went wrong. Please try again.', 'bot');
      } finally {
        sendBtn.disabled = false;
        msg.focus();
      }
    }

    msg.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    msg.addEventListener('input', () => {
      msg.style.height = 'auto';
      msg.style.height = Math.min(msg.scrollHeight, 120) + 'px';
    });

    resetChat();

    // Close edit dialog on overlay click
    document.getElementById('edit-mode').addEventListener('click', e => {
      if (e.target.id === 'edit-mode') closeEditDialog();
    });

    // Close edit dialog on Escape key
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && document.getElementById('edit-mode').classList.contains('active')) {
        closeEditDialog();
      }
    });

    // PWA install
    const installBtn = document.getElementById('install-btn');
    let deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'flex';
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') installBtn.style.display = 'none';
      deferredPrompt = null;
    });

    window.addEventListener('appinstalled', () => { installBtn.style.display = 'none'; });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw.js');
    }
  </script>
</body>
</html>
